version: '3.8'

services:
  # PostgreSQL for Keycloak
  postgres:
    image: postgres:16-alpine
    container_name: keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak} -d ${POSTGRES_DB:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:26.3.0
    container_name: keycloak
    restart: unless-stopped
    command: start --optimized
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-keycloak.example.com}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/conf/server.crt.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/conf/server.key.pem
      # WebAuthn 配置
      KC_FEATURES: web-authn,passkeys
      # 性能优化
      JAVA_OPTS_APPEND: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -Djava.net.preferIPv4Stack=true"
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./certs:/opt/keycloak/conf:ro
      - keycloak_data:/opt/keycloak/data
    networks:
      - keycloak-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      # 服务器配置
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.example.com}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      
      # 安全配置
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ALLOW_EMBEDDING: "false"
      GF_SECURITY_CSRF_ADDITIONAL_HEADERS: "X-Forwarded-Host"
      
      # 会话配置
      GF_SESSION_PROVIDER: redis
      GF_SESSION_PROVIDER_CONFIG: addr=redis:6379,pool_size=100,prefix=session
      
      # 日志配置
      GF_LOG_MODE: console
      GF_LOG_LEVEL: info
      
      # 数据库配置
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: grafana-postgres:5432
      GF_DATABASE_NAME: ${GRAFANA_DB:-grafana}
      GF_DATABASE_USER: ${GRAFANA_DB_USER:-grafana}
      GF_DATABASE_PASSWORD: ${GRAFANA_DB_PASSWORD:-changeme}
      
      # OIDC 配置 (Keycloak)
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Keycloak"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-grafana}
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-changeme}
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid email profile offline_access roles"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://${KEYCLOAK_HOSTNAME:-keycloak.example.com}:8443/realms/${KEYCLOAK_REALM:-grafana}/protocol/openid-connect/auth"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://${KEYCLOAK_HOSTNAME:-keycloak.example.com}:8443/realms/${KEYCLOAK_REALM:-grafana}/protocol/openid-connect/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "https://${KEYCLOAK_HOSTNAME:-keycloak.example.com}:8443/realms/${KEYCLOAK_REALM:-grafana}/protocol/openid-connect/userinfo"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(roles[*], 'grafanaadmin') && 'GrafanaAdmin' || contains(roles[*], 'admin') && 'Admin' || contains(roles[*], 'editor') && 'Editor' || 'Viewer'"
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: "true"
      GF_AUTH_GENERIC_OAUTH_USE_REFRESH_TOKEN: "true"
      GF_AUTH_GENERIC_OAUTH_SIGNOUT_REDIRECT_URL: "https://${KEYCLOAK_HOSTNAME:-keycloak.example.com}:8443/realms/${KEYCLOAK_REALM:-grafana}/protocol/openid-connect/logout?post_logout_redirect_uri=https%3A%2F%2F${GRAFANA_HOSTNAME:-grafana.example.com}%2Flogin"
      
      # 禁用其他认证方式
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - keycloak-network
      - grafana-network
    depends_on:
      - grafana-postgres
      - redis
      - keycloak
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL for Grafana
  grafana-postgres:
    image: postgres:16-alpine
    container_name: grafana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GRAFANA_DB:-grafana}
      POSTGRES_USER: ${GRAFANA_DB_USER:-grafana}
      POSTGRES_PASSWORD: ${GRAFANA_DB_PASSWORD:-changeme}
    volumes:
      - grafana_postgres_data:/var/lib/postgresql/data
    networks:
      - grafana-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GRAFANA_DB_USER:-grafana} -d ${GRAFANA_DB:-grafana}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Grafana sessions
  redis:
    image: redis:7-alpine
    container_name: grafana-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - grafana-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy (可选)
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - keycloak-network
      - grafana-network
    depends_on:
      - keycloak
      - grafana

volumes:
  postgres_data:
  keycloak_data:
  grafana_data:
  grafana_postgres_data:
  redis_data:

networks:
  keycloak-network:
    driver: bridge
  grafana-network:
    driver: bridge
